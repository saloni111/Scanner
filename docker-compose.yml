services:
  db:
    image: ankane/pgvector:v0.5.1
    container_name: scanner-db
    environment:
      POSTGRES_USER: scanner
      POSTGRES_PASSWORD: scanner
      POSTGRES_DB: scanner
    ports:
      - "5432:5432"
    volumes:
      - scanner_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanner -d scanner"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: scanner-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://scanner:scanner@db:5432/scanner
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.rag.cve_loader --seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  scanner_db:
